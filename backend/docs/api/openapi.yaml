  '/api/v1/orders/{order}/cancel':
    post:
      summary: 'Cancel order'
      operationId: cancelOrder
      description: "Cancel a PENDING order owned by the authenticated user. Stock is\nreturned to every line's referenced product (lines whose product\nwas deleted are skipped — those stock units stay where they are).\nAlready-completed or already-cancelled orders return 422."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Sipariş iptal edildi.'
                  data:
                    id: 5
                    status: cancelled
                    total_amount: '350.00'
                    currency: TRY
                    totals:
                      TRY: '350.00'
                      USD: '7.75'
                      EUR: '6.61'
                    items: []
                    created_at: '2026-05-04T20:00:00+00:00'
                    updated_at: '2026-05-04T20:01:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Sipariş iptal edildi.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 5
                      status:
                        type: string
                        example: cancelled
                      total_amount:
                        type: string
                        example: '350.00'
                      currency:
                        type: string
                        example: TRY
                      totals:
                        type: object
                        properties:
                          TRY:
                            type: string
                            example: '350.00'
                          USD:
                            type: string
                            example: '7.75'
                          EUR:
                            type: string
                            example: '6.61'
                      items:
                        type: array
                        example: []
                      created_at:
                        type: string
                        example: '2026-05-04T20:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-04T20:01:00+00:00'
        422:
          description: 'terminal state'
          content:
            application/json:
