openapi: 3.0.3
info:
  title: 'Dehasoft Case API'
  description: 'Laravel 12 e-commerce API for the Dehasoft case study. JWT authentication, multi-currency display backed by daily TCMB exchange rates, and a transactional checkout flow with admin-gated order completion.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8080'
tags:
  -
    name: Meta
    description: ''
  -
    name: Auth
    description: ''
  -
    name: Products
    description: ''
  -
    name: Cart
    description: ''
  -
    name: Orders
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token by calling <code>POST /api/v1/auth/login</code> with the seeded demo credentials (<code>customer@dehasoft.test</code> or <code>admin@dehasoft.test</code>, password <code>password</code>) and copy the <code>data.access_token</code> from the response.'
security:
  -
    default: []
paths:
  /api/v1/health:
    get:
      summary: 'Health check'
      operationId: healthCheck
      description: "Liveness / readiness probe. Returns the per-dependency state of the\ndatabase and redis. The HTTP status is 200 when every dependency\nanswers, otherwise 503 with the failing services flagged as `down`."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: null
                  data:
                    status: ok
                    timestamp: '2026-05-04T20:00:00+00:00'
                    services:
                      database: ok
                      redis: ok
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      timestamp:
                        type: string
                        example: '2026-05-04T20:00:00+00:00'
                      services:
                        type: object
                        properties:
                          database:
                            type: string
                            example: ok
                          redis:
                            type: string
                            example: ok
        503:
          description: 'redis is unreachable'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: null
                  data:
                    status: degraded
                    timestamp: '2026-05-04T20:00:00+00:00'
                    services:
                      database: ok
                      redis: down
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: degraded
                      timestamp:
                        type: string
                        example: '2026-05-04T20:00:00+00:00'
                      services:
                        type: object
                        properties:
                          database:
                            type: string
                            example: ok
                          redis:
                            type: string
                            example: down
      tags:
        - Meta
      security: []
  /api/v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: 'Create a new user account and immediately issue a JWT.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Hesap oluşturuldu.'
                  data:
                    access_token: eyJ0eXAiOi...
                    token_type: bearer
                    expires_in: 3600
                    user:
                      id: 7
                      name: 'Halil Tuksal'
                      email: halil@example.com
                      is_admin: false
                      created_at: '2026-05-04T20:00:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Hesap oluşturuldu.'
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: eyJ0eXAiOi...
                      token_type:
                        type: string
                        example: bearer
                      expires_in:
                        type: integer
                        example: 3600
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 7
                          name:
                            type: string
                            example: 'Halil Tuksal'
                          email:
                            type: string
                            example: halil@example.com
                          is_admin:
                            type: boolean
                            example: false
                          created_at:
                            type: string
                            example: '2026-05-04T20:00:00+00:00'
        422:
          description: 'email already taken'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Bu e-posta adresi zaten kayıtlı.'
                  data: null
                  code: ERR_VALIDATION
                  errors:
                    email:
                      - 'Bu e-posta adresi zaten kayıtlı.'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Bu e-posta adresi zaten kayıtlı.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  code:
                    type: string
                    example: ERR_VALIDATION
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Bu e-posta adresi zaten kayıtlı.'
                        items:
                          type: string
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Display name (2–255 chars).'
                  example: 'Halil Tuksal'
                email:
                  type: string
                  description: 'Unique RFC-valid email address.'
                  example: halil@example.com
                password:
                  type: string
                  description: 'Minimum 8 characters with at least one letter and one number.'
                  example: secret123
                password_confirmation:
                  type: string
                  description: 'Must match the password field.'
                  example: secret123
              required:
                - name
                - email
                - password
                - password_confirmation
      security: []
  /api/v1/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Verify credentials and return a fresh JWT.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Giriş başarılı.'
                  data:
                    access_token: eyJ0eXAiOi...
                    token_type: bearer
                    expires_in: 3600
                    user:
                      id: 2
                      name: 'Demo Customer'
                      email: customer@dehasoft.test
                      is_admin: false
                      created_at: '2026-05-04T18:00:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Giriş başarılı.'
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: eyJ0eXAiOi...
                      token_type:
                        type: string
                        example: bearer
                      expires_in:
                        type: integer
                        example: 3600
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          name:
                            type: string
                            example: 'Demo Customer'
                          email:
                            type: string
                            example: customer@dehasoft.test
                          is_admin:
                            type: boolean
                            example: false
                          created_at:
                            type: string
                            example: '2026-05-04T18:00:00+00:00'
        401:
          description: 'bad credentials'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'The provided credentials are invalid.'
                  data: null
                  code: ERR_INVALID_CREDENTIALS
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'The provided credentials are invalid.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  code:
                    type: string
                    example: ERR_INVALID_CREDENTIALS
        429:
          description: 'rate limit exceeded'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Too many requests. Please slow down.'
                  data: null
                  code: ERR_TOO_MANY_REQUESTS
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Too many requests. Please slow down.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  code:
                    type: string
                    example: ERR_TOO_MANY_REQUESTS
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Account email.'
                  example: customer@dehasoft.test
                password:
                  type: string
                  description: 'Account password.'
                  example: password
              required:
                - email
                - password
      security: []
  /api/v1/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Blacklist the current bearer token so it cannot be reused.'
      parameters: []
      responses:
        204:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example: {  }
                properties: {  }
      tags:
        - Auth
  /api/v1/auth/refresh:
    post:
      summary: 'Refresh token'
      operationId: refreshToken
      description: "Rotate the current bearer token. The previous token is blacklisted\nand a brand-new one is returned alongside the user payload."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Oturum yenilendi.'
                  data:
                    access_token: eyJ0eXAiOi...newer...
                    token_type: bearer
                    expires_in: 3600
                    user:
                      id: 2
                      name: 'Demo Customer'
                      email: customer@dehasoft.test
                      is_admin: false
                      created_at: '2026-05-04T18:00:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Oturum yenilendi.'
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        example: eyJ0eXAiOi...newer...
                      token_type:
                        type: string
                        example: bearer
                      expires_in:
                        type: integer
                        example: 3600
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 2
                          name:
                            type: string
                            example: 'Demo Customer'
                          email:
                            type: string
                            example: customer@dehasoft.test
                          is_admin:
                            type: boolean
                            example: false
                          created_at:
                            type: string
                            example: '2026-05-04T18:00:00+00:00'
      tags:
        - Auth
  /api/v1/auth/me:
    get:
      summary: 'Current user'
      operationId: currentUser
      description: 'Return the user identified by the bearer token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: null
                  data:
                    id: 2
                    name: 'Demo Customer'
                    email: customer@dehasoft.test
                    is_admin: false
                    created_at: '2026-05-04T18:00:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 2
                      name:
                        type: string
                        example: 'Demo Customer'
                      email:
                        type: string
                        example: customer@dehasoft.test
                      is_admin:
                        type: boolean
                        example: false
                      created_at:
                        type: string
                        example: '2026-05-04T18:00:00+00:00'
      tags:
        - Auth
  /api/v1/products:
    get:
      summary: 'List products'
      operationId: listProducts
      description: "Paginated catalogue. Each product carries `prices` in TRY/USD/EUR\ncomputed from the latest cached TCMB rates."
      parameters:
        -
          in: query
          name: search
          description: 'Filter by name or description (LIKE %term%).'
          example: kahve
          required: false
          schema:
            type: string
            description: 'Filter by name or description (LIKE %term%).'
            example: kahve
        -
          in: query
          name: per_page
          description: 'Page size, 1–100 (default 15).'
          example: 15
          required: false
          schema:
            type: integer
            description: 'Page size, 1–100 (default 15).'
            example: 15
        -
          in: query
          name: page
          description: 'Page number, 1-based (default 1).'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number, 1-based (default 1).'
            example: 1
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: null
                  data:
                    items:
                      -
                        id: 1
                        name: 'Türk Kahvesi 250g'
                        description: 'Geleneksel Türk kahvesi, taze çekilmiş.'
                        stock: 80
                        base_currency: TRY
                        price: '95.00'
                        prices:
                          TRY: '95.00'
                          USD: '2.10'
                          EUR: '1.79'
                        created_at: '2026-05-04T18:00:00+00:00'
                        updated_at: '2026-05-04T18:00:00+00:00'
                    pagination:
                      current_page: 1
                      last_page: 1
                      per_page: 15
                      total: 10
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        example:
                          -
                            id: 1
                            name: 'Türk Kahvesi 250g'
                            description: 'Geleneksel Türk kahvesi, taze çekilmiş.'
                            stock: 80
                            base_currency: TRY
                            price: '95.00'
                            prices:
                              TRY: '95.00'
                              USD: '2.10'
                              EUR: '1.79'
                            created_at: '2026-05-04T18:00:00+00:00'
                            updated_at: '2026-05-04T18:00:00+00:00'
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name:
                              type: string
                              example: 'Türk Kahvesi 250g'
                            description:
                              type: string
                              example: 'Geleneksel Türk kahvesi, taze çekilmiş.'
                            stock:
                              type: integer
                              example: 80
                            base_currency:
                              type: string
                              example: TRY
                            price:
                              type: string
                              example: '95.00'
                            prices:
                              type: object
                              properties:
                                TRY:
                                  type: string
                                  example: '95.00'
                                USD:
                                  type: string
                                  example: '2.10'
                                EUR:
                                  type: string
                                  example: '1.79'
                            created_at:
                              type: string
                              example: '2026-05-04T18:00:00+00:00'
                            updated_at:
                              type: string
                              example: '2026-05-04T18:00:00+00:00'
                      pagination:
                        type: object
                        properties:
                          current_page:
                            type: integer
                            example: 1
                          last_page:
                            type: integer
                            example: 1
                          per_page:
                            type: integer
                            example: 15
                          total:
                            type: integer
                            example: 10
      tags:
        - Products
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                  nullable: true
                per_page:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 100.'
                  example: 22
                  nullable: true
                page:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 67
                  nullable: true
      security: []
    post:
      summary: 'Create product (admin)'
      operationId: createProductadmin
      description: 'Add a new product to the catalogue. Requires an admin bearer token.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Ürün oluşturuldu.'
                  data:
                    id: 11
                    name: 'Test Product'
                    description: 'Premium quality.'
                    stock: 10
                    base_currency: TRY
                    price: '99.99'
                    prices:
                      TRY: '99.99'
                      USD: '2.21'
                      EUR: '1.89'
                    created_at: '2026-05-04T20:00:00+00:00'
                    updated_at: '2026-05-04T20:00:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Ürün oluşturuldu.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 11
                      name:
                        type: string
                        example: 'Test Product'
                      description:
                        type: string
                        example: 'Premium quality.'
                      stock:
                        type: integer
                        example: 10
                      base_currency:
                        type: string
                        example: TRY
                      price:
                        type: string
                        example: '99.99'
                      prices:
                        type: object
                        properties:
                          TRY:
                            type: string
                            example: '99.99'
                          USD:
                            type: string
                            example: '2.21'
                          EUR:
                            type: string
                            example: '1.89'
                      created_at:
                        type: string
                        example: '2026-05-04T20:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-04T20:00:00+00:00'
        403:
          description: 'not an admin'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'Administrator privileges are required.'
                  data: null
                  code: ERR_UNAUTHORIZED
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'Administrator privileges are required.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  code:
                    type: string
                    example: ERR_UNAUTHORIZED
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Product name (2–255 chars).'
                  example: 'Test Product'
                description:
                  type: string
                  description: 'Optional description (≤ 5000 chars).'
                  example: 'Premium quality.'
                  nullable: true
                price:
                  type: numeric
                  description: 'Decimal with up to two fraction digits, ≥ 0.'
                  example: '99.99'
                base_currency:
                  type: string
                  description: 'One of TRY, USD, EUR.'
                  example: TRY
                stock:
                  type: integer
                  description: 'Non-negative quantity on hand.'
                  example: 10
              required:
                - name
                - price
                - base_currency
                - stock
  '/api/v1/products/{id}':
    get:
      summary: 'Show product'
      operationId: showProduct
      description: 'Fetch a single product with its multi-currency price block.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: null
                  data:
                    id: 1
                    name: 'Türk Kahvesi 250g'
                    description: 'Geleneksel Türk kahvesi, taze çekilmiş.'
                    stock: 80
                    base_currency: TRY
                    price: '95.00'
                    prices:
                      TRY: '95.00'
                      USD: '2.10'
                      EUR: '1.79'
                    created_at: '2026-05-04T18:00:00+00:00'
                    updated_at: '2026-05-04T18:00:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Türk Kahvesi 250g'
                      description:
                        type: string
                        example: 'Geleneksel Türk kahvesi, taze çekilmiş.'
                      stock:
                        type: integer
                        example: 80
                      base_currency:
                        type: string
                        example: TRY
                      price:
                        type: string
                        example: '95.00'
                      prices:
                        type: object
                        properties:
                          TRY:
                            type: string
                            example: '95.00'
                          USD:
                            type: string
                            example: '2.10'
                          EUR:
                            type: string
                            example: '1.79'
                      created_at:
                        type: string
                        example: '2026-05-04T18:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-04T18:00:00+00:00'
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'The requested resource was not found.'
                  data: null
                  code: ERR_NOT_FOUND
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'The requested resource was not found.'
                  data:
                    type: string
                    example: null
                    nullable: true
                  code:
                    type: string
                    example: ERR_NOT_FOUND
      tags:
        - Products
      security: []
    put:
      summary: 'Update product (admin)'
      operationId: updateProductadmin
      description: "Patch any subset of fields on an existing product. Fields you omit\nstay untouched."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: 'Ürün güncellendi.'
                  data:
                    id: 11
                    name: 'Renamed Product'
                    description: 'Premium quality.'
                    stock: 25
                    base_currency: USD
                    price: '149.99'
                    prices:
                      TRY: '6776.39'
                      USD: '149.99'
                      EUR: '128.04'
                    created_at: '2026-05-04T20:00:00+00:00'
                    updated_at: '2026-05-04T20:05:00+00:00'
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: 'Ürün güncellendi.'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 11
                      name:
                        type: string
                        example: 'Renamed Product'
                      description:
                        type: string
                        example: 'Premium quality.'
                      stock:
                        type: integer
                        example: 25
                      base_currency:
                        type: string
                        example: USD
                      price:
                        type: string
                        example: '149.99'
                      prices:
                        type: object
                        properties:
                          TRY:
                            type: string
                            example: '6776.39'
                          USD:
                            type: string
                            example: '149.99'
                          EUR:
                            type: string
                            example: '128.04'
                      created_at:
                        type: string
                        example: '2026-05-04T20:00:00+00:00'
                      updated_at:
                        type: string
                        example: '2026-05-04T20:05:00+00:00'
      tags:
        - Products
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Updated name.'
                  example: 'Renamed Product'
                description:
                  type: string
                  description: 'Updated description.'
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                price:
                  type: numeric
                  description: 'Updated price (decimal:0,2 ≥ 0).'
                  example: '149.99'
                base_currency:
                  type: string
                  description: TRY|USD|EUR.
                  example: USD
                stock:
                  type: integer
                  description: 'Updated stock.'
